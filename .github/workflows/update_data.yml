name: Update Channel Data

on:
  schedule:
    - cron: '0 0 * * *' # နေ့စဉ် ညသန်းခေါင်မှာ Auto run ပါမယ်
  workflow_dispatch: # ကိုယ်တိုင် trigger ပေးပြီး run လို့လည်း ရပါတယ်

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run update script
        run: python update_channels.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add channel.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update channel data" && git push)
